<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="我的收支" />
  <link rel="manifest" href="manifest.json" />
  <title>我的收支</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg: #0f0f13;
      --surface: #1a1a24;
      --surface2: #22222f;
      --border: #2e2e3e;
      --accent: #6c63ff;
      --accent2: #a78bfa;
      --green: #34d399;
      --red: #f87171;
      --yellow: #fbbf24;
      --text: #f0f0f5;
      --text2: #9090a8;
      --radius: 16px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* NAV */
    .nav {
      position: fixed;
      bottom: 0;
      left: 0; right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
      z-index: 100;
    }
    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 4px 0;
      cursor: pointer;
      color: var(--text2);
      font-size: 11px;
      transition: color .2s;
      border: none;
      background: none;
    }
    .nav-item.active { color: var(--accent2); }
    .nav-item svg { width: 24px; height: 24px; }

    /* PAGES */
    .page {
      display: none;
      padding: 0 16px 120px;
      padding-top: calc(env(safe-area-inset-top) + 16px);
    }
    .page.active { display: block; }

    /* HEADER */
    .page-header {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 20px;
      padding-top: 8px;
    }

    /* CARD */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 12px;
    }

    /* TOTAL CARD */
    .total-card {
      background: linear-gradient(135deg, #3730a3, #6c63ff);
      border: none;
      text-align: center;
      padding: 32px 20px;
    }
    .total-label { font-size: 13px; color: rgba(255,255,255,0.7); margin-bottom: 8px; }
    .total-amount { font-size: 42px; font-weight: 800; letter-spacing: -1px; }
    .total-sub { font-size: 13px; color: rgba(255,255,255,0.7); margin-top: 6px; }

    /* SECTION TITLE */
    .section-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin: 20px 0 10px;
    }

    /* LIST ITEM */
    .list-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 8px;
      cursor: pointer;
      transition: background .15s;
    }
    .list-item:active { background: var(--surface2); }
    .list-icon {
      width: 44px; height: 44px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .list-info { flex: 1; min-width: 0; }
    .list-name { font-size: 15px; font-weight: 600; }
    .list-sub { font-size: 13px; color: var(--text2); margin-top: 2px; }
    .list-amount { font-size: 16px; font-weight: 700; text-align: right; flex-shrink: 0; }
    .list-amount.green { color: var(--green); }
    .list-amount.red { color: var(--red); }

    /* ADD BUTTON */
    .add-btn {
      width: 100%;
      padding: 14px;
      border-radius: var(--radius);
      border: 2px dashed var(--border);
      background: none;
      color: var(--text2);
      font-size: 15px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: border-color .2s, color .2s;
      margin-top: 4px;
    }
    .add-btn:active { border-color: var(--accent); color: var(--accent); }

    /* MODAL */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      display: none;
      align-items: flex-end;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border-radius: 24px 24px 0 0;
      width: 100%;
      padding: 24px 20px calc(24px + env(safe-area-inset-bottom));
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .modal-close {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: var(--surface2);
      border: none;
      color: var(--text2);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }

    /* FORM */
    .form-group { margin-bottom: 16px; }
    .form-label { font-size: 13px; color: var(--text2); margin-bottom: 6px; display: block; }
    .form-input {
      width: 100%;
      padding: 13px 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 16px;
      outline: none;
      transition: border-color .2s;
    }
    .form-input:focus { border-color: var(--accent); }
    .form-select {
      width: 100%;
      padding: 13px 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 16px;
      outline: none;
      appearance: none;
    }

    /* EMOJI PICKER */
    .emoji-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
      margin-top: 8px;
    }
    .emoji-btn {
      aspect-ratio: 1;
      border-radius: 10px;
      background: var(--surface2);
      border: 2px solid transparent;
      font-size: 22px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: border-color .15s;
    }
    .emoji-btn.selected { border-color: var(--accent); }

    /* PRIMARY BUTTON */
    .btn-primary {
      width: 100%;
      padding: 15px;
      border-radius: var(--radius);
      background: var(--accent);
      border: none;
      color: white;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .2s;
      margin-top: 8px;
    }
    .btn-primary:active { opacity: 0.8; }

    .btn-danger {
      width: 100%;
      padding: 13px;
      border-radius: var(--radius);
      background: transparent;
      border: 1px solid var(--red);
      color: var(--red);
      font-size: 15px;
      cursor: pointer;
      margin-top: 10px;
    }

    /* SUMMARY CARD */
    .summary-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .summary-row:last-child { border-bottom: none; }
    .summary-key { font-size: 14px; color: var(--text2); }
    .summary-val { font-size: 15px; font-weight: 700; }

    /* CHIP */
    .chip {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    .chip-purple { background: rgba(108,99,255,0.2); color: var(--accent2); }
    .chip-green  { background: rgba(52,211,153,0.15); color: var(--green); }
    .chip-yellow { background: rgba(251,191,36,0.15); color: var(--yellow); }
  </style>
</head>
<body>

<!-- PAGES -->
<div id="page-home" class="page active">
  <div style="padding-top:16px"></div>

  <!-- Total -->
  <div class="card total-card">
    <div class="total-label">我總共有</div>
    <div class="total-amount" id="total-balance">NT$0</div>
    <div class="total-sub" id="total-sub">跨 <span id="account-count">0</span> 個帳戶</div>
  </div>

  <!-- Monthly expense summary -->
  <div class="section-title">每月固定支出</div>
  <div class="card" id="expense-summary-card">
    <div class="summary-row">
      <span class="summary-key">月費合計</span>
      <span class="summary-val red" id="monthly-total">NT$0</span>
    </div>
    <div class="summary-row">
      <span class="summary-key">年費合計（換算月）</span>
      <span class="summary-val red" id="yearly-monthly">NT$0</span>
    </div>
    <div class="summary-row">
      <span class="summary-key">每月總固定支出</span>
      <span class="summary-val red" id="total-fixed">NT$0</span>
    </div>
  </div>

  <!-- Accounts preview -->
  <div class="section-title">帳戶概覽</div>
  <div id="home-accounts"></div>
</div>

<div id="page-accounts" class="page">
  <div class="page-header">帳戶</div>
  <div id="accounts-list"></div>
  <button class="add-btn" onclick="openAddAccount()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
    新增帳戶
  </button>
</div>

<div id="page-expenses" class="page">
  <div class="page-header">固定支出</div>
  <div id="expenses-list"></div>
  <button class="add-btn" onclick="openAddExpense()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
    新增支出項目
  </button>
</div>

<!-- BOTTOM NAV -->
<nav class="nav">
  <button class="nav-item active" onclick="showPage('home',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    首頁
  </button>
  <button class="nav-item" onclick="showPage('accounts',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
    帳戶
  </button>
  <button class="nav-item" onclick="showPage('expenses',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
    支出
  </button>
</nav>

<!-- MODAL: Account -->
<div class="modal-overlay" id="modal-account" onclick="closeModalIfOverlay(event,'modal-account')">
  <div class="modal">
    <div class="modal-title">
      <span id="modal-account-title">新增帳戶</span>
      <button class="modal-close" onclick="closeModal('modal-account')">×</button>
    </div>
    <div class="form-group">
      <label class="form-label">帳戶名稱</label>
      <input class="form-input" id="acc-name" placeholder="例：玉山銀行、街口支付" />
    </div>
    <div class="form-group">
      <label class="form-label">目前餘額（NT$）</label>
      <input class="form-input" id="acc-balance" type="number" placeholder="0" inputmode="decimal" />
    </div>
    <div class="form-group">
      <label class="form-label">選個圖示</label>
      <div class="emoji-grid" id="acc-emoji-grid"></div>
    </div>
    <button class="btn-primary" onclick="saveAccount()">儲存</button>
    <button class="btn-danger" id="delete-acc-btn" onclick="deleteAccount()" style="display:none">刪除這個帳戶</button>
  </div>
</div>

<!-- MODAL: Expense -->
<div class="modal-overlay" id="modal-expense" onclick="closeModalIfOverlay(event,'modal-expense')">
  <div class="modal">
    <div class="modal-title">
      <span id="modal-expense-title">新增支出項目</span>
      <button class="modal-close" onclick="closeModal('modal-expense')">×</button>
    </div>
    <div class="form-group">
      <label class="form-label">項目名稱</label>
      <input class="form-input" id="exp-name" placeholder="例：Netflix、勞健保" />
    </div>
    <div class="form-group">
      <label class="form-label">金額（NT$）</label>
      <input class="form-input" id="exp-amount" type="number" placeholder="0" inputmode="decimal" />
    </div>
    <div class="form-group">
      <label class="form-label">扣費週期</label>
      <select class="form-select" id="exp-cycle">
        <option value="monthly">每月</option>
        <option value="yearly">每年</option>
        <option value="quarterly">每季</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">選個圖示</label>
      <div class="emoji-grid" id="exp-emoji-grid"></div>
    </div>
    <button class="btn-primary" onclick="saveExpense()">儲存</button>
    <button class="btn-danger" id="delete-exp-btn" onclick="deleteExpense()" style="display:none">刪除這個項目</button>
  </div>
</div>

<script>
const ACCOUNT_EMOJIS = ['🏦','💳','💰','💵','🪙','📱','🏧','💎','🏪','🎯','🌸','⚡','🔐','🎪','🌊','🔥'];
const EXPENSE_EMOJIS = ['📱','🛡️','🎬','🎵','☁️','🏠','🚗','🍔','✈️','📚','💊','🎮','🛒','💡','🌐','⚽','🎓','👗','🐾','🏋️'];

let editAccountId = null;
let editExpenseId = null;
let selectedAccEmoji = ACCOUNT_EMOJIS[0];
let selectedExpEmoji = EXPENSE_EMOJIS[0];

// ---- STORAGE ----
function getData() {
  return {
    accounts: JSON.parse(localStorage.getItem('fin_accounts') || '[]'),
    expenses: JSON.parse(localStorage.getItem('fin_expenses') || '[]'),
  };
}
function saveData(key, val) {
  localStorage.setItem('fin_' + key, JSON.stringify(val));
}

// ---- FORMAT ----
function fmt(n) {
  return 'NT$' + Math.round(n).toLocaleString('zh-TW');
}
function cycleLabel(c) {
  return { monthly:'每月', yearly:'每年', quarterly:'每季' }[c] || c;
}
function toMonthly(amount, cycle) {
  if (cycle === 'monthly') return amount;
  if (cycle === 'yearly') return amount / 12;
  if (cycle === 'quarterly') return amount / 3;
  return amount;
}

// ---- RENDER ----
function renderAll() {
  renderHome();
  renderAccounts();
  renderExpenses();
}

function renderHome() {
  const { accounts, expenses } = getData();
  const total = accounts.reduce((s, a) => s + (parseFloat(a.balance) || 0), 0);
  document.getElementById('total-balance').textContent = fmt(total);
  document.getElementById('account-count').textContent = accounts.length;

  const monthly = expenses.filter(e => e.cycle === 'monthly').reduce((s,e) => s + parseFloat(e.amount||0), 0);
  const yearlyMonthly = expenses.filter(e => e.cycle !== 'monthly').reduce((s,e) => s + toMonthly(parseFloat(e.amount||0), e.cycle), 0);
  document.getElementById('monthly-total').textContent = fmt(monthly);
  document.getElementById('yearly-monthly').textContent = fmt(yearlyMonthly);
  document.getElementById('total-fixed').textContent = fmt(monthly + yearlyMonthly);

  const homeAccounts = document.getElementById('home-accounts');
  if (accounts.length === 0) {
    homeAccounts.innerHTML = '<div style="text-align:center;color:var(--text2);padding:20px 0;font-size:14px">還沒有帳戶，去「帳戶」頁面新增吧</div>';
  } else {
    homeAccounts.innerHTML = accounts.map(a => `
      <div class="list-item">
        <div class="list-icon" style="background:rgba(108,99,255,0.15)">${a.emoji}</div>
        <div class="list-info">
          <div class="list-name">${a.name}</div>
        </div>
        <div class="list-amount green">${fmt(a.balance)}</div>
      </div>
    `).join('');
  }
}

function renderAccounts() {
  const { accounts } = getData();
  const el = document.getElementById('accounts-list');
  if (accounts.length === 0) {
    el.innerHTML = '<div style="text-align:center;color:var(--text2);padding:30px 0;font-size:14px">點下方按鈕新增第一個帳戶</div>';
    return;
  }
  el.innerHTML = accounts.map(a => `
    <div class="list-item" onclick="openEditAccount('${a.id}')">
      <div class="list-icon" style="background:rgba(108,99,255,0.15)">${a.emoji}</div>
      <div class="list-info">
        <div class="list-name">${a.name}</div>
        <div class="list-sub">點擊編輯</div>
      </div>
      <div class="list-amount green">${fmt(a.balance)}</div>
    </div>
  `).join('');
}

function renderExpenses() {
  const { expenses } = getData();
  const el = document.getElementById('expenses-list');
  if (expenses.length === 0) {
    el.innerHTML = '<div style="text-align:center;color:var(--text2);padding:30px 0;font-size:14px">點下方按鈕新增第一個支出項目</div>';
    return;
  }
  el.innerHTML = expenses.map(e => `
    <div class="list-item" onclick="openEditExpense('${e.id}')">
      <div class="list-icon" style="background:rgba(248,113,113,0.1)">${e.emoji}</div>
      <div class="list-info">
        <div class="list-name">${e.name}</div>
        <div class="list-sub"><span class="chip chip-${e.cycle==='monthly'?'purple':e.cycle==='yearly'?'yellow':'green'}">${cycleLabel(e.cycle)}</span></div>
      </div>
      <div class="list-amount red">-${fmt(e.amount)}</div>
    </div>
  `).join('');
}

// ---- NAV ----
function showPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  btn.classList.add('active');
}

// ---- MODAL ----
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function closeModalIfOverlay(e, id) { if (e.target === e.currentTarget) closeModal(id); }

function buildEmojiGrid(gridId, emojis, selected, onSelect) {
  const grid = document.getElementById(gridId);
  grid.innerHTML = emojis.map(em => `
    <button class="emoji-btn ${em === selected ? 'selected' : ''}" onclick="selectEmoji('${gridId}','${em}')">${em}</button>
  `).join('');
}

function selectEmoji(gridId, emoji) {
  document.querySelectorAll(`#${gridId} .emoji-btn`).forEach(b => b.classList.remove('selected'));
  event.currentTarget.classList.add('selected');
  if (gridId === 'acc-emoji-grid') selectedAccEmoji = emoji;
  else selectedExpEmoji = emoji;
}

// ---- ACCOUNT CRUD ----
function openAddAccount() {
  editAccountId = null;
  selectedAccEmoji = ACCOUNT_EMOJIS[0];
  document.getElementById('modal-account-title').textContent = '新增帳戶';
  document.getElementById('acc-name').value = '';
  document.getElementById('acc-balance').value = '';
  document.getElementById('delete-acc-btn').style.display = 'none';
  buildEmojiGrid('acc-emoji-grid', ACCOUNT_EMOJIS, selectedAccEmoji);
  openModal('modal-account');
}

function openEditAccount(id) {
  const { accounts } = getData();
  const a = accounts.find(x => x.id === id);
  if (!a) return;
  editAccountId = id;
  selectedAccEmoji = a.emoji;
  document.getElementById('modal-account-title').textContent = '編輯帳戶';
  document.getElementById('acc-name').value = a.name;
  document.getElementById('acc-balance').value = a.balance;
  document.getElementById('delete-acc-btn').style.display = 'block';
  buildEmojiGrid('acc-emoji-grid', ACCOUNT_EMOJIS, selectedAccEmoji);
  openModal('modal-account');
}

function saveAccount() {
  const name = document.getElementById('acc-name').value.trim();
  const balance = parseFloat(document.getElementById('acc-balance').value) || 0;
  if (!name) { document.getElementById('acc-name').focus(); return; }

  let { accounts } = getData();
  if (editAccountId) {
    accounts = accounts.map(a => a.id === editAccountId ? { ...a, name, balance, emoji: selectedAccEmoji } : a);
  } else {
    accounts.push({ id: Date.now().toString(), name, balance, emoji: selectedAccEmoji });
  }
  saveData('accounts', accounts);
  closeModal('modal-account');
  renderAll();
}

function deleteAccount() {
  if (!editAccountId) return;
  let { accounts } = getData();
  accounts = accounts.filter(a => a.id !== editAccountId);
  saveData('accounts', accounts);
  closeModal('modal-account');
  renderAll();
}

// ---- EXPENSE CRUD ----
function openAddExpense() {
  editExpenseId = null;
  selectedExpEmoji = EXPENSE_EMOJIS[0];
  document.getElementById('modal-expense-title').textContent = '新增支出項目';
  document.getElementById('exp-name').value = '';
  document.getElementById('exp-amount').value = '';
  document.getElementById('exp-cycle').value = 'monthly';
  document.getElementById('delete-exp-btn').style.display = 'none';
  buildEmojiGrid('exp-emoji-grid', EXPENSE_EMOJIS, selectedExpEmoji);
  openModal('modal-expense');
}

function openEditExpense(id) {
  const { expenses } = getData();
  const e = expenses.find(x => x.id === id);
  if (!e) return;
  editExpenseId = id;
  selectedExpEmoji = e.emoji;
  document.getElementById('modal-expense-title').textContent = '編輯支出項目';
  document.getElementById('exp-name').value = e.name;
  document.getElementById('exp-amount').value = e.amount;
  document.getElementById('exp-cycle').value = e.cycle;
  document.getElementById('delete-exp-btn').style.display = 'block';
  buildEmojiGrid('exp-emoji-grid', EXPENSE_EMOJIS, selectedExpEmoji);
  openModal('modal-expense');
}

function saveExpense() {
  const name = document.getElementById('exp-name').value.trim();
  const amount = parseFloat(document.getElementById('exp-amount').value) || 0;
  const cycle = document.getElementById('exp-cycle').value;
  if (!name) { document.getElementById('exp-name').focus(); return; }

  let { expenses } = getData();
  if (editExpenseId) {
    expenses = expenses.map(e => e.id === editExpenseId ? { ...e, name, amount, cycle, emoji: selectedExpEmoji } : e);
  } else {
    expenses.push({ id: Date.now().toString(), name, amount, cycle, emoji: selectedExpEmoji });
  }
  saveData('expenses', expenses);
  closeModal('modal-expense');
  renderAll();
}

function deleteExpense() {
  if (!editExpenseId) return;
  let { expenses } = getData();
  expenses = expenses.filter(e => e.id !== editExpenseId);
  saveData('expenses', expenses);
  closeModal('modal-expense');
  renderAll();
}

// ---- INIT ----
renderAll();
</script>
</body>
</html>
