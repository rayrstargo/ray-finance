<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="小幣記帳"/>
  <link rel="manifest" href="manifest.json"/>
  <title>小幣記帳</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    :root{
      --bg:#07080f;
      --s1:#0d1117;
      --s2:#111827;
      --s3:#1a2236;
      --border:#1f2d45;
      --accent:#818cf8;
      --accent2:#c084fc;
      --gold:#fbbf24;
      --gold2:#fde68a;
      --green:#34d399;
      --red:#f87171;
      --blue:#38bdf8;
      --t1:#f1f5f9;
      --t2:#94a3b8;
      --t3:#475569;
      --r:16px;
    }
    html,body{height:100%;overscroll-behavior:none}
    body{
      background:var(--bg);
      color:var(--t1);
      font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;
      min-height:100vh;
      padding-bottom:calc(72px + env(safe-area-inset-bottom));
      overflow-x:hidden;
    }

    /* ── NOISE TEXTURE OVERLAY ── */
    body::before{
      content:'';position:fixed;inset:0;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events:none;z-index:0;opacity:.4;
    }

    /* ── NAV ── */
    .nav{
      position:fixed;bottom:0;left:0;right:0;
      background:rgba(13,17,23,.92);
      backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
      border-top:1px solid var(--border);
      display:flex;
      padding:10px 0 calc(10px + env(safe-area-inset-bottom));
      z-index:100;
    }
    .nav-btn{
      flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;
      padding:4px 0;cursor:pointer;
      color:var(--t3);font-size:10px;font-weight:600;letter-spacing:.3px;
      border:none;background:none;transition:color .2s;
    }
    .nav-btn.active{color:var(--accent)}
    .nav-icon{
      width:26px;height:26px;
      display:flex;align-items:center;justify-content:center;
      transition:transform .2s;
    }
    .nav-btn.active .nav-icon{transform:scale(1.1)}
    .nav-dot{
      width:4px;height:4px;border-radius:50%;
      background:var(--accent);margin-top:2px;
      opacity:0;transition:opacity .2s;
    }
    .nav-btn.active .nav-dot{opacity:1}

    /* ── PAGES ── */
    .page{display:none;position:relative;z-index:1}
    .page.active{display:block}
    .page-wrap{padding:0 16px 24px;padding-top:calc(env(safe-area-inset-top) + 20px)}

    /* ── HEADINGS ── */
    .page-title{font-size:26px;font-weight:800;letter-spacing:-.5px;margin-bottom:20px;padding-top:6px}
    .section-label{
      font-size:11px;font-weight:700;letter-spacing:1.5px;
      color:var(--t3);text-transform:uppercase;margin:22px 0 10px;
    }

    /* ── MASCOT ── */
    .mascot-wrap{display:flex;align-items:center;gap:16px;margin-bottom:20px;padding:6px 0}
    .mascot-svg{width:72px;height:80px;flex-shrink:0;animation:float 4s ease-in-out infinite}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
    .mascot-bubble{
      flex:1;
      background:var(--s2);
      border:1px solid var(--border);
      border-radius:14px;
      padding:12px 14px;
      position:relative;font-size:14px;line-height:1.5;color:var(--t2);
    }
    .mascot-bubble::before{
      content:'';position:absolute;left:-8px;top:50%;transform:translateY(-50%);
      border:8px solid transparent;border-right-color:var(--border);margin-left:-1px;
    }
    .mascot-bubble::after{
      content:'';position:absolute;left:-6px;top:50%;transform:translateY(-50%);
      border:7px solid transparent;border-right-color:var(--s2);
    }
    .mascot-hi{font-size:13px;font-weight:700;color:var(--t1);margin-bottom:3px}

    /* ── TOTAL CARD ── */
    .total-card{
      border-radius:22px;
      background:linear-gradient(135deg,#1e1b4b 0%,#2d2777 40%,#4a1d9b 100%);
      padding:28px 24px;margin-bottom:14px;
      position:relative;overflow:hidden;
    }
    .total-card::before{
      content:'';position:absolute;top:-40px;right:-40px;
      width:180px;height:180px;border-radius:50%;
      background:radial-gradient(circle,rgba(129,140,248,.25),transparent 70%);
    }
    .total-card::after{
      content:'';position:absolute;bottom:-30px;left:-20px;
      width:130px;height:130px;border-radius:50%;
      background:radial-gradient(circle,rgba(192,132,252,.15),transparent 70%);
    }
    .total-card-label{font-size:13px;color:rgba(255,255,255,.6);margin-bottom:10px;letter-spacing:.3px}
    .total-card-amount{font-size:44px;font-weight:900;letter-spacing:-2px;line-height:1;position:relative;z-index:1}
    .total-card-sub{
      display:flex;gap:10px;margin-top:14px;
      position:relative;z-index:1;
    }
    .total-chip{
      background:rgba(255,255,255,.12);border-radius:20px;
      padding:5px 12px;font-size:12px;font-weight:600;color:rgba(255,255,255,.85);
    }

    /* ── SUMMARY GRID ── */
    .summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px}
    .summary-cell{
      background:var(--s2);border:1px solid var(--border);
      border-radius:var(--r);padding:16px 14px;
    }
    .summary-cell-label{font-size:11px;color:var(--t3);margin-bottom:8px;font-weight:600;letter-spacing:.5px}
    .summary-cell-val{font-size:20px;font-weight:800;letter-spacing:-.5px}
    .summary-cell-val.red{color:var(--red)}
    .summary-cell-val.green{color:var(--green)}
    .summary-cell-sub{font-size:11px;color:var(--t3);margin-top:4px}

    /* ── CARDS ── */
    .card{
      background:var(--s2);border:1px solid var(--border);
      border-radius:var(--r);padding:18px;margin-bottom:10px;
    }

    /* ── LIST ITEMS ── */
    .item{
      display:flex;align-items:center;gap:12px;
      padding:14px 16px;
      background:var(--s2);border:1px solid var(--border);
      border-radius:var(--r);margin-bottom:8px;
      cursor:pointer;transition:background .15s,border-color .15s;
      -webkit-user-select:none;user-select:none;
    }
    .item:active{background:var(--s3);border-color:var(--accent)}
    .item-icon{
      width:44px;height:44px;border-radius:12px;
      display:flex;align-items:center;justify-content:center;
      font-size:20px;flex-shrink:0;
    }
    .item-icon.purple{background:rgba(129,140,248,.15)}
    .item-icon.red{background:rgba(248,113,113,.12)}
    .item-icon.green{background:rgba(52,211,153,.12)}
    .item-icon.gold{background:rgba(251,191,36,.12)}
    .item-icon.blue{background:rgba(56,189,248,.12)}
    .item-body{flex:1;min-width:0}
    .item-name{font-size:15px;font-weight:600}
    .item-sub{font-size:12px;color:var(--t3);margin-top:3px}
    .item-right{text-align:right;flex-shrink:0}
    .item-amount{font-size:16px;font-weight:700}
    .item-amount.green{color:var(--green)}
    .item-amount.red{color:var(--red)}
    .item-date{font-size:11px;color:var(--t3);margin-top:3px}

    /* ── ADD BUTTON ── */
    .add-btn{
      width:100%;padding:15px;border-radius:var(--r);
      border:2px dashed var(--border);background:none;
      color:var(--t3);font-size:14px;font-weight:600;
      cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;
      transition:all .2s;margin-top:4px;
    }
    .add-btn:active{border-color:var(--accent);color:var(--accent)}

    /* ── FAB ── */
    .fab{
      position:fixed;right:20px;bottom:calc(88px + env(safe-area-inset-bottom));
      width:56px;height:56px;border-radius:18px;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      border:none;color:white;font-size:26px;
      display:none;align-items:center;justify-content:center;
      box-shadow:0 8px 24px rgba(129,140,248,.4);
      cursor:pointer;z-index:99;
      transition:transform .15s;
    }
    .fab.show{display:flex}
    .fab:active{transform:scale(.92)}

    /* ── CHIP ── */
    .chip{
      display:inline-flex;align-items:center;
      padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;
    }
    .chip.purple{background:rgba(129,140,248,.18);color:var(--accent)}
    .chip.yellow{background:rgba(251,191,36,.15);color:var(--gold)}
    .chip.green{background:rgba(52,211,153,.15);color:var(--green)}
    .chip.blue{background:rgba(56,189,248,.15);color:var(--blue)}

    /* ── MODAL ── */
    .overlay{
      position:fixed;inset:0;background:rgba(0,0,0,.75);
      z-index:200;display:none;align-items:flex-end;
      backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
    }
    .overlay.open{display:flex}
    .modal{
      background:var(--s1);border-radius:26px 26px 0 0;
      width:100%;padding:28px 20px calc(28px + env(safe-area-inset-bottom));
      max-height:92vh;overflow-y:auto;
      border-top:1px solid var(--border);
    }
    .modal-handle{
      width:36px;height:4px;border-radius:2px;
      background:var(--border);margin:0 auto 20px;
    }
    .modal-title{
      font-size:20px;font-weight:800;margin-bottom:22px;
      display:flex;align-items:center;justify-content:space-between;
    }
    .modal-close{
      width:30px;height:30px;border-radius:50%;
      background:var(--s3);border:none;color:var(--t2);
      cursor:pointer;font-size:16px;
      display:flex;align-items:center;justify-content:center;
    }

    /* ── FORM ── */
    .fg{margin-bottom:18px}
    .fl{font-size:12px;font-weight:700;color:var(--t3);letter-spacing:.5px;margin-bottom:8px;display:block;text-transform:uppercase}
    .fi,.fsel{
      width:100%;padding:14px 16px;
      background:var(--s3);border:1.5px solid var(--border);
      border-radius:14px;color:var(--t1);font-size:16px;outline:none;
      transition:border-color .2s;appearance:none;
    }
    .fi:focus,.fsel:focus{border-color:var(--accent)}
    .fi::placeholder{color:var(--t3)}

    /* ── EMOJI GRID ── */
    .emoji-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:6px}
    .emoji-btn{
      aspect-ratio:1;border-radius:10px;background:var(--s3);
      border:2px solid transparent;font-size:21px;
      cursor:pointer;display:flex;align-items:center;justify-content:center;
      transition:border-color .15s,transform .1s;
    }
    .emoji-btn.sel{border-color:var(--accent)}
    .emoji-btn:active{transform:scale(.9)}

    /* ── CATEGORY GRID ── */
    .cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:6px}
    .cat-btn{
      border-radius:12px;background:var(--s3);
      border:2px solid transparent;
      padding:10px 4px;font-size:10px;font-weight:700;
      color:var(--t2);cursor:pointer;
      display:flex;flex-direction:column;align-items:center;gap:4px;
      transition:all .15s;
    }
    .cat-btn span{font-size:22px}
    .cat-btn.sel{border-color:var(--accent);color:var(--accent);background:rgba(129,140,248,.1)}

    /* ── BUTTONS ── */
    .btn-primary{
      width:100%;padding:16px;border-radius:var(--r);
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      border:none;color:white;font-size:16px;font-weight:800;
      cursor:pointer;margin-top:10px;letter-spacing:.3px;
      box-shadow:0 4px 20px rgba(129,140,248,.3);
      transition:opacity .15s,transform .15s;
    }
    .btn-primary:active{opacity:.85;transform:scale(.98)}
    .btn-danger{
      width:100%;padding:14px;border-radius:var(--r);
      background:transparent;border:1.5px solid rgba(248,113,113,.4);
      color:var(--red);font-size:15px;font-weight:700;
      cursor:pointer;margin-top:10px;
    }

    /* ── MONTH FILTER ── */
    .month-nav{
      display:flex;align-items:center;justify-content:space-between;
      padding:12px 16px;background:var(--s2);
      border:1px solid var(--border);border-radius:var(--r);
      margin-bottom:14px;
    }
    .month-arrow{
      width:34px;height:34px;border-radius:10px;
      background:var(--s3);border:none;color:var(--t2);
      font-size:18px;cursor:pointer;
      display:flex;align-items:center;justify-content:center;
    }
    .month-label{font-size:16px;font-weight:800;color:var(--t1)}

    /* ── DAILY GROUP ── */
    .day-group{margin-bottom:16px}
    .day-label{
      font-size:12px;font-weight:700;color:var(--t3);
      letter-spacing:.5px;margin-bottom:8px;
      display:flex;align-items:center;justify-content:space-between;
    }
    .day-total{font-size:12px;color:var(--red);font-weight:700}

    /* ── EMPTY STATE ── */
    .empty{
      text-align:center;padding:48px 20px;
      color:var(--t3);font-size:14px;line-height:1.8;
    }
    .empty-emoji{font-size:40px;margin-bottom:12px;display:block}

    /* ── DIVIDER ── */
    .divider{height:1px;background:var(--border);margin:14px 0}
  </style>
</head>
<body>

<!-- ═══ PAGE: HOME ═══ -->
<div id="p-home" class="page active">
  <div class="page-wrap">

    <!-- Mascot -->
    <div class="mascot-wrap">
      <svg class="mascot-svg" viewBox="0 0 120 140" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="bg" cx="38%" cy="32%">
            <stop offset="0%" stop-color="#fde68a"/>
            <stop offset="55%" stop-color="#fbbf24"/>
            <stop offset="100%" stop-color="#d97706"/>
          </radialGradient>
          <radialGradient id="cheek">
            <stop offset="0%" stop-color="#fb923c" stop-opacity=".5"/>
            <stop offset="100%" stop-color="#fb923c" stop-opacity="0"/>
          </radialGradient>
        </defs>
        <!-- shadow -->
        <ellipse cx="60" cy="133" rx="28" ry="5" fill="rgba(0,0,0,.25)"/>
        <!-- arm left -->
        <path d="M18 72 Q26 58 34 65" stroke="url(#bg)" stroke-width="13" fill="none" stroke-linecap="round"/>
        <circle cx="16" cy="74" r="7" fill="url(#bg)"/>
        <!-- arm right -->
        <path d="M102 72 Q94 58 86 65" stroke="url(#bg)" stroke-width="13" fill="none" stroke-linecap="round"/>
        <circle cx="104" cy="74" r="7" fill="url(#bg)"/>
        <!-- body -->
        <circle cx="60" cy="72" r="50" fill="url(#bg)"/>
        <!-- coin slot -->
        <rect x="50" y="22" width="20" height="6" rx="3" fill="rgba(0,0,0,.22)"/>
        <!-- shine -->
        <ellipse cx="43" cy="47" rx="14" ry="9" fill="rgba(255,255,255,.28)" transform="rotate(-35 43 47)"/>
        <!-- eyes white -->
        <circle cx="43" cy="65" r="11" fill="white"/>
        <circle cx="77" cy="65" r="11" fill="white"/>
        <!-- eyes pupil -->
        <circle cx="46" cy="67" r="7" fill="#1a0a3e"/>
        <circle cx="80" cy="67" r="7" fill="#1a0a3e"/>
        <!-- eyes sparkle -->
        <circle cx="50" cy="63" r="3" fill="white"/>
        <circle cx="84" cy="63" r="3" fill="white"/>
        <!-- cheeks -->
        <circle cx="31" cy="76" r="11" fill="url(#cheek)"/>
        <circle cx="89" cy="76" r="11" fill="url(#cheek)"/>
        <!-- smile -->
        <path d="M42 84 Q60 100 78 84" stroke="#92400e" stroke-width="4" fill="none" stroke-linecap="round"/>
        <!-- $ -->
        <text x="60" y="61" text-anchor="middle" fill="rgba(255,255,255,.35)" font-size="11" font-weight="900" font-family="Arial">$</text>
      </svg>
      <div class="mascot-bubble">
        <div class="mascot-hi">嗨！我是小幣 🌟</div>
        <div id="mascot-msg">今天的錢都好好的嗎？</div>
      </div>
    </div>

    <!-- Total Balance -->
    <div class="total-card">
      <div class="total-card-label">我總共有</div>
      <div class="total-card-amount" id="h-total">NT$0</div>
      <div class="total-card-sub">
        <div class="total-chip" id="h-acc-chip">0 個帳戶</div>
        <div class="total-chip" id="h-cash-chip" style="display:none">含現金</div>
      </div>
    </div>

    <!-- Monthly Summary -->
    <div class="section-label">本月概況</div>
    <div class="summary-grid">
      <div class="summary-cell">
        <div class="summary-cell-label">固定支出</div>
        <div class="summary-cell-val red" id="h-fixed">NT$0</div>
        <div class="summary-cell-sub">每月</div>
      </div>
      <div class="summary-cell">
        <div class="summary-cell-label">日常消費</div>
        <div class="summary-cell-val red" id="h-daily">NT$0</div>
        <div class="summary-cell-sub" id="h-daily-sub">本月</div>
      </div>
    </div>
    <div class="card" style="display:flex;justify-content:space-between;align-items:center;padding:14px 18px">
      <span style="font-size:14px;color:var(--t2);font-weight:600">本月總支出</span>
      <span style="font-size:20px;font-weight:900;color:var(--red)" id="h-total-out">NT$0</span>
    </div>

    <!-- Account Overview -->
    <div class="section-label">帳戶概覽</div>
    <div id="h-accounts"></div>

  </div>
</div>

<!-- ═══ PAGE: ACCOUNTS ═══ -->
<div id="p-accounts" class="page">
  <div class="page-wrap">
    <div class="page-title">帳戶</div>
    <div id="acc-list"></div>
    <button class="add-btn" onclick="openAddAcc()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      新增帳戶 / 現金
    </button>
  </div>
</div>

<!-- ═══ PAGE: TRANSACTIONS ═══ -->
<div id="p-tx" class="page">
  <div class="page-wrap">
    <div class="page-title">日常記帳</div>
    <div class="month-nav">
      <button class="month-arrow" onclick="changeMonth(-1)">‹</button>
      <div class="month-label" id="tx-month-label"></div>
      <button class="month-arrow" onclick="changeMonth(1)">›</button>
    </div>
    <div id="tx-list"></div>
  </div>
</div>

<!-- ═══ PAGE: FIXED ═══ -->
<div id="p-fixed" class="page">
  <div class="page-wrap">
    <div class="page-title">固定支出</div>
    <!-- Summary -->
    <div class="card" style="padding:16px 18px">
      <div style="display:flex;justify-content:space-between;margin-bottom:10px">
        <span style="font-size:13px;color:var(--t3)">月費合計</span>
        <span style="font-weight:700;color:var(--red)" id="f-monthly">NT$0</span>
      </div>
      <div class="divider" style="margin:10px 0"></div>
      <div style="display:flex;justify-content:space-between">
        <span style="font-size:13px;color:var(--t3)">年費（換算月）</span>
        <span style="font-weight:700;color:var(--red)" id="f-yearly">NT$0</span>
      </div>
    </div>
    <div id="fixed-list"></div>
    <button class="add-btn" onclick="openAddFixed()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      新增固定支出
    </button>
  </div>
</div>

<!-- ═══ FAB ═══ -->
<button class="fab" id="fab" onclick="openAddTx()">+</button>

<!-- ═══ NAV ═══ -->
<nav class="nav">
  <button class="nav-btn active" onclick="gotoPage('home',this)">
    <div class="nav-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    </div>
    首頁
    <div class="nav-dot"></div>
  </button>
  <button class="nav-btn" onclick="gotoPage('accounts',this)">
    <div class="nav-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
    </div>
    帳戶
    <div class="nav-dot"></div>
  </button>
  <button class="nav-btn" onclick="gotoPage('tx',this)">
    <div class="nav-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
    </div>
    記帳
    <div class="nav-dot"></div>
  </button>
  <button class="nav-btn" onclick="gotoPage('fixed',this)">
    <div class="nav-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    </div>
    固定
    <div class="nav-dot"></div>
  </button>
</nav>

<!-- ═══ MODAL: Account ═══ -->
<div class="overlay" id="m-acc" onclick="closeIfOvr(event,'m-acc')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">
      <span id="m-acc-title">新增帳戶</span>
      <button class="modal-close" onclick="closeM('m-acc')">×</button>
    </div>
    <div class="fg">
      <label class="fl">帳戶名稱</label>
      <input class="fi" id="a-name" placeholder="玉山銀行、現金、街口支付…"/>
    </div>
    <div class="fg">
      <label class="fl">目前餘額（NT$）</label>
      <input class="fi" id="a-bal" type="number" inputmode="decimal" placeholder="0"/>
    </div>
    <div class="fg">
      <label class="fl">選個圖示</label>
      <div class="emoji-grid" id="a-emojis"></div>
    </div>
    <button class="btn-primary" onclick="saveAcc()">儲存</button>
    <button class="btn-danger" id="a-del" style="display:none" onclick="delAcc()">刪除這個帳戶</button>
  </div>
</div>

<!-- ═══ MODAL: Transaction ═══ -->
<div class="overlay" id="m-tx" onclick="closeIfOvr(event,'m-tx')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">
      <span id="m-tx-title">新增消費</span>
      <button class="modal-close" onclick="closeM('m-tx')">×</button>
    </div>
    <div class="fg">
      <label class="fl">類別</label>
      <div class="cat-grid" id="tx-cats"></div>
    </div>
    <div class="fg">
      <label class="fl">金額（NT$）</label>
      <input class="fi" id="tx-amt" type="number" inputmode="decimal" placeholder="0"/>
    </div>
    <div class="fg">
      <label class="fl">備註（選填）</label>
      <input class="fi" id="tx-note" placeholder="吃了什麼、買了什麼…"/>
    </div>
    <div class="fg">
      <label class="fl">日期</label>
      <input class="fi" id="tx-date" type="date"/>
    </div>
    <button class="btn-primary" onclick="saveTx()">記錄</button>
    <button class="btn-danger" id="tx-del" style="display:none" onclick="delTx()">刪除這筆</button>
  </div>
</div>

<!-- ═══ MODAL: Fixed Expense ═══ -->
<div class="overlay" id="m-fixed" onclick="closeIfOvr(event,'m-fixed')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">
      <span id="m-fixed-title">新增固定支出</span>
      <button class="modal-close" onclick="closeM('m-fixed')">×</button>
    </div>
    <div class="fg">
      <label class="fl">項目名稱</label>
      <input class="fi" id="f-name" placeholder="Netflix、勞健保、手機費…"/>
    </div>
    <div class="fg">
      <label class="fl">金額（NT$）</label>
      <input class="fi" id="f-amt" type="number" inputmode="decimal" placeholder="0"/>
    </div>
    <div class="fg">
      <label class="fl">扣費週期</label>
      <select class="fsel" id="f-cycle">
        <option value="monthly">每月</option>
        <option value="yearly">每年</option>
        <option value="quarterly">每季</option>
      </select>
    </div>
    <div class="fg">
      <label class="fl">選個圖示</label>
      <div class="emoji-grid" id="f-emojis"></div>
    </div>
    <button class="btn-primary" onclick="saveFixed()">儲存</button>
    <button class="btn-danger" id="f-del" style="display:none" onclick="delFixed()">刪除這個項目</button>
  </div>
</div>

<script>
// ════ DATA ════
const DB = {
  get(k){ return JSON.parse(localStorage.getItem('sb_'+k)||'[]') },
  set(k,v){ localStorage.setItem('sb_'+k,JSON.stringify(v)) }
}

// ════ CONSTANTS ════
const ACC_EMOJIS  = ['🏦','💳','💰','💵','🪙','📱','🏧','🔑','🌸','⚡','💎','🎯','🏪','🌊','🔥','✨']
const EXP_EMOJIS  = ['📱','🛡️','🎬','🎵','☁️','🏠','🚗','🍔','✈️','📚','💊','🎮','🛒','💡','🌐','🎓','👗','🐾','🏋️','🎁']
const CATS = [
  {id:'food',  emoji:'🍔',label:'餐飲'},
  {id:'transport',emoji:'🚗',label:'交通'},
  {id:'shop',  emoji:'🛒',label:'購物'},
  {id:'fun',   emoji:'🎮',label:'娛樂'},
  {id:'health',emoji:'💊',label:'醫療'},
  {id:'beauty',emoji:'💄',label:'美妝'},
  {id:'daily', emoji:'🏠',label:'日用'},
  {id:'edu',   emoji:'📚',label:'學習'},
  {id:'cafe',  emoji:'☕',label:'咖啡'},
  {id:'clothes',emoji:'👗',label:'服飾'},
  {id:'gift',  emoji:'🎁',label:'禮物'},
  {id:'other', emoji:'💸',label:'其他'},
]
const CAT_MAP = Object.fromEntries(CATS.map(c=>[c.id,c]))

const MASCOT_MSGS = [
  '今天的錢都好好的嗎？',
  '記得記帳，錢才不會不見！',
  '小幣替你守住每一分錢 💪',
  '省一點，存多一點！',
  '今天也要好好賺錢哦～',
]

// ════ STATE ════
let editAccId = null, editFixedId = null, editTxId = null
let selAccEmoji = ACC_EMOJIS[0], selFixedEmoji = EXP_EMOJIS[0], selCat = 'food'
let txYear, txMonth

function initMonth(){
  const now = new Date()
  txYear = now.getFullYear(); txMonth = now.getMonth()
}

// ════ FORMAT ════
const fmt = n => 'NT$' + Math.round(n).toLocaleString('zh-TW')
const cycleLabel = c => ({monthly:'每月',yearly:'每年',quarterly:'每季'}[c]||c)
const toMonthly = (amt,c) => c==='monthly'?amt : c==='yearly'?amt/12 : c==='quarterly'?amt/3 : amt
const padZ = n => String(n).padStart(2,'0')
const todayStr = () => { const d=new Date(); return `${d.getFullYear()}-${padZ(d.getMonth()+1)}-${padZ(d.getDate())}` }
const fmtDate = s => { const [y,m,d]=s.split('-'); return `${m}/${d}` }
const fmtDateFull = s => { const [y,m,d]=s.split('-'); return `${y} 年 ${m} 月 ${d} 日` }

// ════ NAV ════
function gotoPage(name, btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'))
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'))
  document.getElementById('p-'+name).classList.add('active')
  btn.classList.add('active')
  document.getElementById('fab').className = name==='tx' ? 'fab show' : 'fab'
  if(name==='tx') renderTx()
  if(name==='fixed') renderFixed()
  if(name==='accounts') renderAccounts()
  if(name==='home') renderHome()
}

// ════ RENDER HOME ════
function renderHome(){
  const accs = DB.get('accounts')
  const fixed = DB.get('fixed')
  const txs = DB.get('txs')
  const now = new Date()
  const ym = `${now.getFullYear()}-${padZ(now.getMonth()+1)}`

  const total = accs.reduce((s,a)=>s+(parseFloat(a.bal)||0),0)
  const hasCash = accs.some(a=>a.name.includes('現金'))
  document.getElementById('h-total').textContent = fmt(total)
  document.getElementById('h-acc-chip').textContent = `${accs.length} 個帳戶`
  document.getElementById('h-cash-chip').style.display = hasCash ? 'block' : 'none'

  const fixedMonthly = fixed.reduce((s,f)=>s+toMonthly(parseFloat(f.amt)||0,f.cycle),0)
  const dailyThis = txs.filter(t=>t.date.startsWith(ym)).reduce((s,t)=>s+(parseFloat(t.amt)||0),0)
  document.getElementById('h-fixed').textContent = fmt(fixedMonthly)
  document.getElementById('h-daily').textContent = fmt(dailyThis)
  document.getElementById('h-total-out').textContent = fmt(fixedMonthly+dailyThis)

  const el = document.getElementById('h-accounts')
  if(!accs.length){
    el.innerHTML='<div class="empty"><span class="empty-emoji">🏦</span>還沒有帳戶<br>去帳戶頁面新增吧</div>'
  } else {
    el.innerHTML = accs.map(a=>`
      <div class="item">
        <div class="item-icon purple">${a.emoji}</div>
        <div class="item-body"><div class="item-name">${a.name}</div></div>
        <div class="item-right"><div class="item-amount green">${fmt(a.bal)}</div></div>
      </div>`).join('')
  }
  document.getElementById('mascot-msg').textContent = MASCOT_MSGS[Math.floor(Math.random()*MASCOT_MSGS.length)]
}

// ════ RENDER ACCOUNTS ════
function renderAccounts(){
  const accs = DB.get('accounts')
  const el = document.getElementById('acc-list')
  if(!accs.length){
    el.innerHTML='<div class="empty"><span class="empty-emoji">💳</span>新增你的第一個帳戶或現金</div>'
    return
  }
  el.innerHTML = accs.map(a=>`
    <div class="item" onclick="openEditAcc('${a.id}')">
      <div class="item-icon purple">${a.emoji}</div>
      <div class="item-body"><div class="item-name">${a.name}</div><div class="item-sub">點擊編輯</div></div>
      <div class="item-right"><div class="item-amount green">${fmt(a.bal)}</div></div>
    </div>`).join('')
}

// ════ RENDER TRANSACTIONS ════
function renderTx(){
  const ym = `${txYear}-${padZ(txMonth+1)}`
  document.getElementById('tx-month-label').textContent = `${txYear} 年 ${txMonth+1} 月`
  const all = DB.get('txs').filter(t=>t.date.startsWith(ym))
  const el = document.getElementById('tx-list')
  if(!all.length){
    el.innerHTML='<div class="empty"><span class="empty-emoji">📝</span>這個月還沒有記帳<br>點右下角 + 新增</div>'
    return
  }
  // group by date
  const groups = {}
  all.sort((a,b)=>b.date.localeCompare(a.date)).forEach(t=>{
    if(!groups[t.date]) groups[t.date]=[]
    groups[t.date].push(t)
  })
  el.innerHTML = Object.entries(groups).map(([date, items])=>{
    const dayTotal = items.reduce((s,t)=>s+(parseFloat(t.amt)||0),0)
    return `<div class="day-group">
      <div class="day-label">
        <span>${fmtDateFull(date)}</span>
        <span class="day-total">-${fmt(dayTotal)}</span>
      </div>
      ${items.map(t=>{
        const cat = CAT_MAP[t.cat]||CAT_MAP.other
        return `<div class="item" onclick="openEditTx('${t.id}')">
          <div class="item-icon red">${cat.emoji}</div>
          <div class="item-body">
            <div class="item-name">${t.note||cat.label}</div>
            <div class="item-sub"><span class="chip purple">${cat.label}</span></div>
          </div>
          <div class="item-right"><div class="item-amount red">-${fmt(t.amt)}</div></div>
        </div>`}).join('')}
    </div>`}).join('')
}

function changeMonth(d){
  txMonth += d
  if(txMonth<0){txMonth=11;txYear--}
  if(txMonth>11){txMonth=0;txYear++}
  renderTx()
}

// ════ RENDER FIXED ════
function renderFixed(){
  const fixed = DB.get('fixed')
  const monthly = fixed.filter(f=>f.cycle==='monthly').reduce((s,f)=>s+(parseFloat(f.amt)||0),0)
  const yearlyM = fixed.filter(f=>f.cycle!=='monthly').reduce((s,f)=>s+toMonthly(parseFloat(f.amt)||0,f.cycle),0)
  document.getElementById('f-monthly').textContent = fmt(monthly)
  document.getElementById('f-yearly').textContent = fmt(yearlyM)
  const el = document.getElementById('fixed-list')
  if(!fixed.length){
    el.innerHTML='<div class="empty"><span class="empty-emoji">📋</span>新增保險費、訂閱費等固定支出</div>'
    return
  }
  el.innerHTML = fixed.map(f=>{
    const chipColor = f.cycle==='monthly'?'purple':f.cycle==='yearly'?'yellow':'green'
    return `<div class="item" onclick="openEditFixed('${f.id}')">
      <div class="item-icon red">${f.emoji}</div>
      <div class="item-body">
        <div class="item-name">${f.name}</div>
        <div class="item-sub"><span class="chip ${chipColor}">${cycleLabel(f.cycle)}</span></div>
      </div>
      <div class="item-right"><div class="item-amount red">-${fmt(f.amt)}</div></div>
    </div>`}).join('')
}

// ════ MODAL UTILS ════
const openM = id => document.getElementById(id).classList.add('open')
const closeM = id => document.getElementById(id).classList.remove('open')
function closeIfOvr(e,id){ if(e.target===e.currentTarget) closeM(id) }

function buildEmojiGrid(gridId, list, sel, setSel){
  document.getElementById(gridId).innerHTML = list.map(e=>`
    <button class="emoji-btn ${e===sel?'sel':''}" onclick="pickEmoji('${gridId}','${e}')">${e}</button>`).join('')
}
function pickEmoji(gridId, emoji){
  document.querySelectorAll(`#${gridId} .emoji-btn`).forEach(b=>b.classList.remove('sel'))
  event.currentTarget.classList.add('sel')
  if(gridId==='a-emojis') selAccEmoji=emoji
  else if(gridId==='f-emojis') selFixedEmoji=emoji
}

function buildCatGrid(){
  document.getElementById('tx-cats').innerHTML = CATS.map(c=>`
    <button class="cat-btn ${c.id===selCat?'sel':''}" onclick="pickCat('${c.id}')">
      <span>${c.emoji}</span>${c.label}
    </button>`).join('')
}
function pickCat(id){
  selCat=id
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('sel'))
  event.currentTarget.classList.add('sel')
}

// ════ ACCOUNT CRUD ════
function openAddAcc(){
  editAccId=null; selAccEmoji=ACC_EMOJIS[0]
  document.getElementById('m-acc-title').textContent='新增帳戶'
  document.getElementById('a-name').value=''
  document.getElementById('a-bal').value=''
  document.getElementById('a-del').style.display='none'
  buildEmojiGrid('a-emojis',ACC_EMOJIS,selAccEmoji)
  openM('m-acc')
}
function openEditAcc(id){
  const a = DB.get('accounts').find(x=>x.id===id); if(!a) return
  editAccId=id; selAccEmoji=a.emoji
  document.getElementById('m-acc-title').textContent='編輯帳戶'
  document.getElementById('a-name').value=a.name
  document.getElementById('a-bal').value=a.bal
  document.getElementById('a-del').style.display='block'
  buildEmojiGrid('a-emojis',ACC_EMOJIS,selAccEmoji)
  openM('m-acc')
}
function saveAcc(){
  const name=document.getElementById('a-name').value.trim()
  const bal=parseFloat(document.getElementById('a-bal').value)||0
  if(!name){document.getElementById('a-name').focus();return}
  let list=DB.get('accounts')
  if(editAccId) list=list.map(a=>a.id===editAccId?{...a,name,bal,emoji:selAccEmoji}:a)
  else list.push({id:Date.now()+'',name,bal,emoji:selAccEmoji})
  DB.set('accounts',list); closeM('m-acc'); renderAccounts(); renderHome()
}
function delAcc(){
  if(!editAccId) return
  DB.set('accounts',DB.get('accounts').filter(a=>a.id!==editAccId))
  closeM('m-acc'); renderAccounts(); renderHome()
}

// ════ TRANSACTION CRUD ════
function openAddTx(){
  editTxId=null; selCat='food'
  document.getElementById('m-tx-title').textContent='新增消費'
  document.getElementById('tx-amt').value=''
  document.getElementById('tx-note').value=''
  document.getElementById('tx-date').value=todayStr()
  document.getElementById('tx-del').style.display='none'
  buildCatGrid(); openM('m-tx')
}
function openEditTx(id){
  const t=DB.get('txs').find(x=>x.id===id); if(!t) return
  editTxId=id; selCat=t.cat
  document.getElementById('m-tx-title').textContent='編輯記帳'
  document.getElementById('tx-amt').value=t.amt
  document.getElementById('tx-note').value=t.note||''
  document.getElementById('tx-date').value=t.date
  document.getElementById('tx-del').style.display='block'
  buildCatGrid(); openM('m-tx')
}
function saveTx(){
  const amt=parseFloat(document.getElementById('tx-amt').value)||0
  const note=document.getElementById('tx-note').value.trim()
  const date=document.getElementById('tx-date').value||todayStr()
  if(!amt){document.getElementById('tx-amt').focus();return}
  let list=DB.get('txs')
  if(editTxId) list=list.map(t=>t.id===editTxId?{...t,amt,note,cat:selCat,date}:t)
  else list.push({id:Date.now()+'',amt,note,cat:selCat,date})
  DB.set('txs',list); closeM('m-tx'); renderTx(); renderHome()
}
function delTx(){
  if(!editTxId) return
  DB.set('txs',DB.get('txs').filter(t=>t.id!==editTxId))
  closeM('m-tx'); renderTx(); renderHome()
}

// ════ FIXED CRUD ════
function openAddFixed(){
  editFixedId=null; selFixedEmoji=EXP_EMOJIS[0]
  document.getElementById('m-fixed-title').textContent='新增固定支出'
  document.getElementById('f-name').value=''
  document.getElementById('f-amt').value=''
  document.getElementById('f-cycle').value='monthly'
  document.getElementById('f-del').style.display='none'
  buildEmojiGrid('f-emojis',EXP_EMOJIS,selFixedEmoji)
  openM('m-fixed')
}
function openEditFixed(id){
  const f=DB.get('fixed').find(x=>x.id===id); if(!f) return
  editFixedId=id; selFixedEmoji=f.emoji
  document.getElementById('m-fixed-title').textContent='編輯固定支出'
  document.getElementById('f-name').value=f.name
  document.getElementById('f-amt').value=f.amt
  document.getElementById('f-cycle').value=f.cycle
  document.getElementById('f-del').style.display='block'
  buildEmojiGrid('f-emojis',EXP_EMOJIS,selFixedEmoji)
  openM('m-fixed')
}
function saveFixed(){
  const name=document.getElementById('f-name').value.trim()
  const amt=parseFloat(document.getElementById('f-amt').value)||0
  const cycle=document.getElementById('f-cycle').value
  if(!name){document.getElementById('f-name').focus();return}
  let list=DB.get('fixed')
  if(editFixedId) list=list.map(f=>f.id===editFixedId?{...f,name,amt,cycle,emoji:selFixedEmoji}:f)
  else list.push({id:Date.now()+'',name,amt,cycle,emoji:selFixedEmoji})
  DB.set('fixed',list); closeM('m-fixed'); renderFixed(); renderHome()
}
function delFixed(){
  if(!editFixedId) return
  DB.set('fixed',DB.get('fixed').filter(f=>f.id!==editFixedId))
  closeM('m-fixed'); renderFixed(); renderHome()
}

// ════ INIT ════
initMonth()
renderHome()
</script>
</body>
</html>
